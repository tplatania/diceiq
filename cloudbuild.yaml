steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--no-cache', '-t', 'us-east1-docker.pkg.dev/$PROJECT_ID/diceiq-repo/diceiq-api:latest', '.']

  # 2. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-east1-docker.pkg.dev/$PROJECT_ID/diceiq-repo/diceiq-api:latest']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'diceiq-api'
      - '--image'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/diceiq-repo/diceiq-api:latest'
      - '--region'
      - 'us-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - '^,^GCS_BUCKET_NAME=diceiq-files,GCP_PROJECT=$PROJECT_ID,INSTANCE_CONNECTION_NAME=psychic-medley-469413-r3:us-east1:diceiq-db,DB_USER=postgres,DB_NAME=diceiq'
      - '--min-instances'
      - '1'
      - '--timeout'
      - '300'
      - '--update-secrets'
      - 'DB_PASS=diceiq-db-password:latest,SECRET_KEY=diceiq-secret-key:latest,VOICE_TOKEN_SECRET=diceiq-voice-token-secret:latest,ELEVENLABS_API_KEY=diceiq-elevenlabs-api-key:latest,ELEVENLABS_SERVER_SECRET=diceiq-elevenlabs-server-secret:latest,STRIPE_SECRET_KEY=diceiq-stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=diceiq-stripe-webhook-secret:latest'

images:
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/diceiq-repo/diceiq-api:latest'

options:
  machineType: 'E2_HIGHCPU_8'
