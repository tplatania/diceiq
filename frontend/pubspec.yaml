name: diceiq
description: Tom's Personal Dice Control Performance Engine
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP calls to Flask backend
  http: ^1.2.0

  # Voice recognition — uses iOS SFSpeechRecognizer (offline)
  speech_to_text: ^6.6.0

  # Text to speech — whispers to hearing aids
  flutter_tts: ^3.8.5

  # Apple Watch haptics + phone haptics
  # (built into Flutter via HapticFeedback)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
